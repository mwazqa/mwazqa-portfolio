name: Playwright Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'playwright-tests-ts/package-lock.json'

      - name: Install dependencies
        working-directory: playwright-tests-ts
        run: npm ci

      - name: Install Playwright browsers
        working-directory: playwright-tests-ts
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        working-directory: playwright-tests-ts
        run: npm test

      - name: Generate Allure report
        if: always()
        working-directory: playwright-tests-ts
        run: |
          npm run allure:generate || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-tests-ts/playwright-report/
          retention-days: 30

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: playwright-tests-ts/allure-report/
          retention-days: 30

      - name: Comment PR with test results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const testResultPath = 'playwright-tests-ts/playwright-report/index.html';
            if (fs.existsSync(testResultPath)) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '✅ Playwright tests completed. Check artifacts for detailed reports.'
              });
            }

